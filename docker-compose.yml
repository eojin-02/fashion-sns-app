services:
  db:
    image: postgis/postgis:16-3.4
    container_name: fsns-db
    environment:
      POSTGRES_DB: fsns
      POSTGRES_USER: fsns
      POSTGRES_PASSWORD: fsns
    ports:
      - "5432:5432"
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - fsns-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fsns"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: fsns-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # S3 호환 스토리지 — Presigned URL 직접 업로드 검증용 (설계서 2.1)
  minio:
    image: minio/minio:latest
    container_name: fsns-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - fsns-minio:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 minioadmin minioadmin; do sleep 1; done;
      mc mb -p local/wardrobe;
      mc anonymous set download local/wardrobe;
      exit 0"

  # 애플리케이션 서버 — 로컬 개발 시엔 ./gradlew bootRun 권장, 컨테이너 실행은 --profile app
  backend:
    build: ./backend
    container_name: fsns-backend
    profiles: ["app"]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/fsns
      SPRING_DATA_REDIS_HOST: redis
      APP_S3_ENDPOINT: http://minio:9000
      APP_S3_PUBLIC_ENDPOINT: http://localhost:9000
    ports:
      - "8080:8080"

  ai-worker:
    build: ./ai-server
    container_name: fsns-ai-worker
    profiles: ["app"]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://fsns:fsns@db:5432/fsns
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT: http://minio:9000
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}

volumes:
  fsns-pgdata:
  fsns-minio:
